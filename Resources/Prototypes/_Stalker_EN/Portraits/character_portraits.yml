# Character portrait prototypes for PDA notifications.
#
# TEXTURE LOCATION:
#   Place PNG files in: /Textures/_Stalker_EN/Portraits/
#   Recommended size: 128x128 pixels
#
# Each portrait is tied to ONE role (jobId).
# To add multiple portraits for the same role, create separate entries with different IDs.
# Use isFallback: true to mark the default portrait for a role.

# ============================================
# DEPARTMENT: Stalker
# ============================================

- type: characterPortrait
  id: Portrait_StalkerRookie
  name: "Rookie Stalker"
  jobId: StalkerRookie
  isFallback: true
  texturePath: "/Textures/_Stalker_EN/Portraits/stalker_rookie.png"

- type: characterPortrait
  id: Portrait_Stalker
  name: "Experienced Stalker"
